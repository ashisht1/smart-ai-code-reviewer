<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Code Reviewer - Serverless Git Hub</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #21262d;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --success-bg: rgba(46, 164, 79, 0.15);
            --danger-color: #f85149;
            --danger-bg: rgba(248, 81, 73, 0.15);
            --warning-color: #d29922;
            --warning-bg: rgba(210, 153, 34, 0.15);
            --font-mono: 'SFMono-Regular', Consolas, "Liberation Mono", Menlo, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar for Input Code & Guidelines */
        .sidebar {
            width: 380px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            overflow-y: auto;
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .logo-icon {
            background-color: var(--accent-color);
            color: var(--bg-color);
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea, input[type="text"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            padding: 10px;
            font-family: var(--font-mono);
            font-size: 12.5px;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-main);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            border-color: #8b949e;
        }

        .btn-primary {
            background-color: var(--success-color);
            border-color: rgba(240, 246, 252, 0.1);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #2c974b;
        }

        /* Right Side Content (Metrics & Review Output) */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            background-color: var(--sidebar-bg);
        }

        header h2 {
            font-size: 16px;
            font-weight: 500;
        }

        .output-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* AST Dashboard Card */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .metric-card {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }

        .metric-val {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Report / Code Markdown View */
        .report-section {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            line-height: 1.6;
        }

        .report-section h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .report-section h3:first-child {
            margin-top: 0;
        }

        .report-section pre {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            font-family: var(--font-mono);
            overflow-x: auto;
            margin: 10px 0;
        }

        .report-section code {
            font-family: var(--font-mono);
            background-color: rgba(110, 118, 129, 0.2);
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Input Configuration Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">C</div>
            <span>Careem AI Serverless Reviewer</span>
        </div>

        <div class="form-group">
            <label for="code-input">Python Code</label>
            <textarea id="code-input" rows="18" placeholder="Paste your Python code here..."># Paste code to review
def calculate(a, b, op):
    if op == 'add':
        return a + b
    elif op == 'sub':
        return a - b
    else:
        return None
</textarea>
        </div>

        <div class="form-group">
            <label for="guidelines-input">Custom Guidelines</label>
            <textarea id="guidelines-input" rows="5" placeholder="Default: Staff Software Engineer review.">Review code as a staff engineer about code and review on all important factors.</textarea>
        </div>

        <button class="btn btn-primary" id="btn-submit" onclick="submitReview()">
            <span class="spinner" id="btn-spinner"></span>
            <span id="btn-text">⚡ Run AI Review</span>
        </button>
    </div>

    <!-- Main Output Pane -->
    <div class="content-area">
        <header>
            <h2>AI Review & Metrics Console</h2>
        </header>

        <div class="output-container" id="output-pane">
            <div style="text-align: center; margin-top: 100px; color: var(--text-muted);">
                <span style="font-size: 48px;">🤖</span>
                <p style="margin-top: 15px; font-size: 14px;">Paste Python code in the sidebar and trigger the analysis.</p>
            </div>
        </div>
    </div>

    <!-- Simple client-side Markdown rendering fallback -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function submitReview() {
            const code = document.getElementById('code-input').value.trim();
            const guidelines = document.getElementById('guidelines-input').value.trim();
            const btn = document.getElementById('btn-submit');
            const spinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');
            const outputPane = document.getElementById('output-pane');

            if (!code) {
                alert("Please enter some Python code to review.");
                return;
            }

            // UI loading state
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Analyzing...';
            outputPane.innerHTML = `<div style="text-align: center; margin-top: 100px;">
                <span class="spinner" style="display:inline-block; width: 40px; height: 40px; border-width: 4px;"></span>
                <p style="margin-top: 15px; color: var(--text-muted);">Analyzing AST metrics and fetching Gemini AI review...</p>
            </div>`;

            try {
                const response = await fetch('/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, guidelines })
                });

                if (!response.ok) {
                    throw new Error(`Server returned status ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    outputPane.innerHTML = `<div style="color: var(--danger-color); padding: 20px; border: 1px solid var(--danger-color); border-radius: 6px; background-color: var(--danger-bg);">
                        <h3>Analysis Failed</h3>
                        <p>${data.error}</p>
                    </div>`;
                    return;
                }

                // Render metrics and AI markdown report
                const stats = data.stats;
                let htmlContent = `
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-val">${data.total_lines}</div>
                            <div class="metric-label">Lines</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-val">${stats.functions}</div>
                            <div class="metric-label">Functions</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-val">${stats.classes}</div>
                            <div class="metric-label">Classes</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-val">${stats.decision_points}</div>
                            <div class="metric-label">Complexity</div>
                        </div>
                    </div>
                `;

                if (data.report) {
                    const parsedMarkdown = marked.parse(data.report);
                    htmlContent += `
                        <div class="report-section">
                            ${parsedMarkdown}
                        </div>
                    `;
                } else {
                    htmlContent += `
                        <div class="report-section" style="color: var(--warning-color); border-color: var(--warning-color); background-color: var(--warning-bg);">
                            <h3>AI Review Skipped</h3>
                            <p>AST metrics successfully computed, but LLM review was skipped. Ensure GEMINI_API_KEY is configured on the backend.</p>
                        </div>
                    `;
                }

                outputPane.innerHTML = htmlContent;

            } catch (err) {
                outputPane.innerHTML = `<div style="color: var(--danger-color); padding: 20px; border: 1px solid var(--danger-color); border-radius: 6px; background-color: var(--danger-bg);">
                    <h3>Communication Error</h3>
                    <p>${err.message}</p>
                </div>`;
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = '⚡ Run AI Review';
            }
        }
    </script>
</body>
</html>
